<!DOCTYPE html>
<!-- 스토어 스크린샷 1 (1280x800): 소개 + 팝업 UI -->
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <style>
    :root {
      --bg: #14141a;
      --card: #1e1e27;
      --border: #30303d;
      --text: #f1f1f6;
      --muted: #8d8da1;
      --accent: #5b7cff;
      --accent-2: #7a5bff;
      --accent-grad: linear-gradient(135deg, var(--accent), var(--accent-2));
    }

    * { box-sizing: border-box; margin: 0; }

    body {
      width: 1280px;
      height: 800px;
      overflow: hidden;
      font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
      color: var(--text);
      background:
        radial-gradient(700px 500px at 88% 20%, rgba(91, 124, 255, 0.16), transparent 70%),
        radial-gradient(600px 500px at 10% 95%, rgba(122, 91, 255, 0.12), transparent 70%),
        var(--bg);
      display: flex;
      align-items: center;
      -webkit-font-smoothing: antialiased;
    }

    .left {
      flex: 1;
      padding: 0 40px 0 72px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 21px;
      font-weight: 700;
      margin-bottom: 34px;
    }

    .brand img { width: 34px; height: 34px; border-radius: 9px; }

    h1 {
      font-size: 52px;
      line-height: 1.22;
      letter-spacing: -0.02em;
      margin-bottom: 18px;
    }

    h1 em {
      font-style: normal;
      background: var(--accent-grad);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    .sub {
      font-size: 19px;
      color: var(--muted);
      margin-bottom: 34px;
    }

    .chips { display: flex; flex-wrap: wrap; gap: 9px; margin-bottom: 46px; max-width: 520px; }

    .chip {
      padding: 8px 16px;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: var(--card);
      font-size: 15px;
      color: var(--text);
    }

    /* before / after */
    .compare { display: flex; align-items: center; gap: 26px; }

    .screen {
      width: 132px;
      height: 224px;
      border-radius: 14px;
      border: 2px solid var(--border);
      background: #000;
      overflow: hidden;
      position: relative;
    }

    .clip {
      position: absolute;
      background: linear-gradient(120deg, #ff9a6a 0%, #e0679a 45%, #6a5bd8 100%);
    }

    /* 기존: 16:9 영상이 세로 화면에 레터박스로 */
    .before .clip { left: 0; right: 0; top: 50%; height: 74px; transform: translateY(-50%); }

    /* Fill Mode: 꽉 채움 */
    .after .clip { inset: 0; }

    .screen .tag {
      position: absolute;
      bottom: 9px;
      left: 50%;
      transform: translateX(-50%);
      padding: 3px 11px;
      border-radius: 999px;
      background: rgba(10, 10, 14, 0.72);
      font-size: 11.5px;
      color: #fff;
      white-space: nowrap;
    }

    .after { border-color: rgba(91, 124, 255, 0.65); box-shadow: 0 0 26px rgba(91, 124, 255, 0.28); }

    .arrow { color: var(--muted); }

    /* right: popup */
    .right {
      width: 470px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding-right: 64px;
    }

    .popup-wrap {
      transform: scale(1.06);
      border-radius: 14px;
      box-shadow: 0 24px 70px rgba(0, 0, 0, 0.55), 0 0 0 1px var(--border);
    }

    iframe {
      width: 300px;
      height: 618px;
      border: none;
      border-radius: 14px;
      display: block;
      background: var(--bg);
    }
  </style>
</head>
<body>
  <div class="left">
    <div class="brand"><img src="../../icons/icon128.png" alt="" /> Fill Mode</div>
    <h1>비디오를 화면에<br /><em>꽉 차게</em></h1>
    <p class="sub">레터박스 제거 — 세로 모니터(9:16)와 커스텀 비율까지</p>
    <div class="chips">
      <span class="chip">📐 프리셋 10종</span>
      <span class="chip">✏️ 커스텀 비율</span>
      <span class="chip">🕹️ 위치 이동</span>
      <span class="chip">⌨️ 전체화면 단축키</span>
      <span class="chip">🌐 6개 언어</span>
    </div>
    <div class="compare">
      <div class="screen before">
        <div class="clip"></div>
        <span class="tag">기존</span>
      </div>
      <svg class="arrow" viewBox="0 0 24 24" width="30" height="30" fill="none" stroke="currentColor"
        stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M5 12h14M13 6l6 6-6 6" />
      </svg>
      <div class="screen after">
        <div class="clip"></div>
        <span class="tag">Fill Mode</span>
      </div>
    </div>
  </div>
  <div class="right">
    <div class="popup-wrap">
      <iframe src="popup-replica-ko.html"></iframe>
    </div>
  </div>
</body>
</html>
