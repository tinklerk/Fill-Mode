<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Fill Mode</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <header>
    <div class="brand">
      <img src="/icons/icon48.png" alt="" width="22" height="22" />
      <h1>Fill Mode</h1>
    </div>
    <label class="switch" id="enable-label" title="">
      <input type="checkbox" id="enabled" />
      <span class="track"><span class="knob"></span></span>
    </label>
  </header>

  <section class="card info">
    <div class="info-row">
      <span class="info-label" data-i18n="monitorLabel"></span>
      <span class="info-value" id="monitor-ratio">—</span>
    </div>
    <div class="info-row">
      <span class="info-label" data-i18n="videoLabel"></span>
      <span class="info-value" id="video-ratio">—</span>
    </div>
  </section>

  <section class="stepper">
    <button id="zoom-out" class="step-btn" aria-label="-">−</button>
    <span id="scale-value">x1.00</span>
    <button id="zoom-in" class="step-btn" aria-label="+">+</button>
  </section>

  <section class="presets">
    <h2 data-i18n="landscape"></h2>
    <div class="preset-row" data-orientation="landscape"></div>
    <h2 data-i18n="portrait"></h2>
    <div class="preset-row" data-orientation="portrait"></div>
  </section>

  <section class="custom">
    <input type="text" id="custom-input" data-i18n-placeholder="customPlaceholder" />
    <button id="custom-apply" class="primary" data-i18n="apply"></button>
  </section>

  <section class="card pan">
    <h2 data-i18n="pan"></h2>
    <div class="pan-body">
      <div class="dpad">
        <button class="dpad-btn dpad-up pan-step" data-axis="panY" data-dir="-1" aria-label="↑">
          <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor"
            stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M6 15l6-6 6 6"/></svg>
        </button>
        <button class="dpad-btn dpad-left pan-step" data-axis="panX" data-dir="-1" aria-label="←">
          <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor"
            stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M15 6l-6 6 6 6"/></svg>
        </button>
        <button class="dpad-btn dpad-center" id="pan-reset" data-i18n-title="panReset" aria-label="reset">
          <svg viewBox="0 0 24 24" width="13" height="13" fill="none" stroke="currentColor"
            stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="1 4 1 10 7 10"/>
            <path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/>
          </svg>
        </button>
        <button class="dpad-btn dpad-right pan-step" data-axis="panX" data-dir="1" aria-label="→">
          <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor"
            stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M9 6l6 6-6 6"/></svg>
        </button>
        <button class="dpad-btn dpad-down pan-step" data-axis="panY" data-dir="1" aria-label="↓">
          <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor"
            stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9l6 6 6-6"/></svg>
        </button>
      </div>
      <div class="pan-values">
        <label>
          <span class="pan-axis">X</span>
          <input type="number" id="pan-x" class="pan-input" min="-50" max="50" step="1" value="0" />
          <span class="pan-unit">%</span>
        </label>
        <label>
          <span class="pan-axis">Y</span>
          <input type="number" id="pan-y" class="pan-input" min="-50" max="50" step="1" value="0" />
          <span class="pan-unit">%</span>
        </label>
      </div>
    </div>
  </section>

  <details class="card shortcuts">
    <summary data-i18n="shortcuts"></summary>
    <div class="shortcut-row">
      <span data-i18n="scToggle"></span>
      <kbd data-key="toggle"></kbd>
    </div>
    <div class="shortcut-row">
      <span data-i18n="cmdCyclePreset"></span>
      <kbd data-key="cycle"></kbd>
    </div>
    <div class="shortcut-row">
      <span data-i18n="cmdDecreaseZoom"></span>
      <kbd data-key="zoomOut"></kbd>
    </div>
    <div class="shortcut-row">
      <span data-i18n="cmdIncreaseZoom"></span>
      <kbd data-key="zoomIn"></kbd>
    </div>
    <div class="shortcut-row">
      <span data-i18n="pan"></span>
      <kbd>Shift + ← ↑ ↓ →</kbd>
    </div>
    <div class="shortcut-row">
      <span data-i18n="panReset"></span>
      <kbd data-key="panReset"></kbd>
    </div>
  </details>

  <footer>
    <button id="reset" class="ghost" data-i18n="reset"></button>
    <a href="#" id="open-options">
      <svg viewBox="0 0 24 24" width="13" height="13" fill="none" stroke="currentColor"
        stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <circle cx="12" cy="12" r="3"></circle>
        <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 1 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 1 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 1 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 1 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
      </svg>
      <span data-i18n="options"></span>
    </a>
  </footer>

  <script src="popup.js"></script>
</body>
</html>
