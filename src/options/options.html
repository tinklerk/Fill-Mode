<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Fill Mode</title>
  <link rel="stylesheet" href="options.css" />
</head>
<body>
  <main>
    <header>
      <img src="/icons/icon48.png" alt="" width="28" height="28" />
      <h1 id="page-title" data-i18n="optionsTitle"></h1>
    </header>

    <section class="card">
      <h2 data-i18n="persistence"></h2>
      <div class="segmented" role="radiogroup">
        <label><input type="radio" name="persistence" value="off" />
          <span data-i18n="persistOff"></span></label>
        <label><input type="radio" name="persistence" value="session" checked />
          <span data-i18n="persistSession"></span></label>
        <label><input type="radio" name="persistence" value="permanent" />
          <span data-i18n="persistPermanent"></span></label>
      </div>
    </section>

    <section class="card">
      <h2 data-i18n="transitionSpeed"></h2>
      <div class="segmented" role="radiogroup">
        <label><input type="radio" name="transition-speed" value="0" /><span>0ms</span></label>
        <label><input type="radio" name="transition-speed" value="150" /><span>150ms</span></label>
        <label><input type="radio" name="transition-speed" value="300" checked /><span>300ms</span></label>
        <label><input type="radio" name="transition-speed" value="500" /><span>500ms</span></label>
      </div>
    </section>

    <section class="card">
      <h2 data-i18n="ratioSource"></h2>
      <div class="segmented" role="radiogroup">
        <label><input type="radio" name="ratio-source" value="screen" checked />
          <span data-i18n="ratioScreen"></span></label>
        <label><input type="radio" name="ratio-source" value="window" />
          <span data-i18n="ratioWindow"></span></label>
      </div>
    </section>

    <section class="card">
      <div class="card-head">
        <h2 data-i18n="shortcuts"></h2>
        <button id="keys-default" class="ghost" data-i18n="resetDefaults"></button>
      </div>
      <div class="shortcut-row">
        <span data-i18n="scToggle"></span>
        <input class="key-input" data-action="toggle" readonly />
      </div>
      <div class="shortcut-row">
        <span data-i18n="cmdCyclePreset"></span>
        <input class="key-input" data-action="cycle" readonly />
      </div>
      <div class="shortcut-row">
        <span data-i18n="cmdDecreaseZoom"></span>
        <input class="key-input" data-action="zoomOut" readonly />
      </div>
      <div class="shortcut-row">
        <span data-i18n="cmdIncreaseZoom"></span>
        <input class="key-input" data-action="zoomIn" readonly />
      </div>
      <div class="shortcut-row">
        <span data-i18n="panReset"></span>
        <input class="key-input" data-action="panReset" readonly />
      </div>
      <div class="shortcut-row">
        <span data-i18n="pan"></span>
        <kbd>Shift + ← ↑ ↓ →</kbd>
      </div>
      <p class="note in-card" data-i18n="shortcutsFullscreenNote"></p>
    </section>

    <p class="note" data-i18n="shortcutsNote"></p>

    <div class="actions">
      <button id="save" class="primary" data-i18n="save"></button>
      <span id="status" role="status"></span>
    </div>
  </main>

  <script src="../common/keys.js"></script>
  <script src="options.js"></script>
</body>
</html>
